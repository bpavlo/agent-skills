use_cases:
  - "Write a new NixOS or nix-darwin flake from scratch"
  - "Refactor an existing flake into modules / hosts / users layout"
  - "Add a new host to a multi-host flake"
  - "Set up sops-nix or agenix for secrets in a flake"
  - "Choose between sops-nix and agenix"
  - "Configure home-manager (integrated as a NixOS module or standalone)"
  - "Design a mkSystem helper that supports NixOS, nix-darwin, and WSL"
  - "Wire overlays using the additions / modifications / unstable-packages pattern"
  - "Centralize username, hostname, email, and network topology in vars/"
  - "Configure declarative disks with disko (LUKS + btrfs + subvolumes)"
  - "Set up secure boot with Lanzaboote and TPM2 LUKS auto-unlock"
  - "Theme a Nix config (Hyprland, GTK, terminal) via a single theme attrset"
  - "Bootstrap a fresh VM or laptop with NixOS via Makefile / Justfile"
  - "Decide whether to use flake-parts, flake-utils, or hand-rolled helpers"
  - "Review a Nix flake for anti-patterns and best-practice violations"
  - "Add a custom package to flake.packages and overlay it into pkgs"
  - "Set up CI checks for a Nix repo (nix flake check, pre-commit, treefmt)"
  - "Migrate from channels to flakes"
  - "Manage multiple nixpkgs versions (stable, unstable, master, patched)"
  - "Wire colmena or deploy-rs for remote SSH deployment"

