use_cases:
  - "User says 'remember our X issue', 'last time', 'previously', 'we discussed'"
  - "User references a past opencode conversation by topic, not by session ID"
  - "Starting work in a familiar repo and prior session context would help"
  - "Find which session discussed a specific bug, file, or design decision"
  - "Summarize what has been done in the current directory recently"
  - "Cross-repo lookup for a topic discussed somewhere across all projects"
  - "Avoid asking the user to re-explain something covered in a prior session"
  - "Hand off context between opencode sessions without manual markdown notes"

triggers:
  - "remember"
  - "last time"
  - "previously"
  - "we discussed"
  - "we fixed"
  - "we set up"
  - "we did"
  - "continue"
  - "where did we"
  - "what have we done"
  - "that issue we had"
  - "the one where"
  - opencode
  - "session history"
  - "past session"
  - "prior conversation"

commands:
  - "oc-context stats"
  - "oc-context recent"
  - "oc-context recent --cwd"
  - "oc-context recent --days 14"
  - "oc-context search <query>"
  - "oc-context search <query> --cwd"
  - "oc-context show <session_id>"
  - "oc-context reindex"
